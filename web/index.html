<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TermLive</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <span class="logo">&#9654;</span>
            <h1>TermLive</h1>
        </div>
        <span id="status" class="status-badge online">
            <span class="status-dot"></span>
            <span class="status-text">Connected</span>
        </span>
    </header>
    <main>
        <div class="section-header">
            <h2>Active Sessions</h2>
            <span id="session-count" class="count-badge">0</span>
        </div>
        <div id="sessions" class="session-grid"></div>
        <div id="empty-msg" class="empty-state" style="display:none;">
            <div class="empty-icon">&#9881;</div>
            <p>No active sessions</p>
            <p class="empty-hint">Run <code>tlive run &lt;command&gt;</code> to start</p>
        </div>
    </main>
    <script src="/js/app.js"></script>
</body>
</html>
